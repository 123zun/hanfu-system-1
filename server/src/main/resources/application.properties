server:
port: 8080
context-path: /

spring:
application:
name: hanfu-community

# ??????
servlet:
multipart:
max-file-size: 10MB
max-request-size: 10MB

# ????????

datasource:
spring.application.name=server
spring.datasource.url=jdbc:mysql://localhost:3306/hanfu_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
hikari:
connection-timeout: 30000
maximum-pool-size: 20
minimum-idle: 5

jackson:
date-format: yyyy-MM-dd HH:mm:ss
time-zone: GMT+8

file.upload.path=/uploads/avatars/

# MyBatis-Plus??
mybatis-plus:
mapper-locations: classpath:mapper/**/*.xml
type-aliases-package: com.server.user.entity
configuration:
map-underscore-to-camel-case: true
log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ????????
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.chain.cache=false
