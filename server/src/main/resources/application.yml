server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hanfu-community

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/hanfu_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  web:
    resources:
      add-mappings: true
      static-locations:
        - classpath:/META-INF/resources/
        - classpath:/resources/
        - classpath:/static/
        - classpath:/public/
        - file:./uploads/  # 添加这行，映射上传目录

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.server.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload:
    path: ./uploads/avatars/