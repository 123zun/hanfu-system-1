server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: hanfu_jwt_secret_key_2024_very_long_and_secure_must_be_at_least_256_bits
  expiration: 86400000

spring:
  application:
    name: hanfu-community

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 512KB

  datasource:
    url: jdbc:mysql://localhost:3306/hanfu_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  web:
    resources:
      add-mappings: true
      static-locations:
        - classpath:/META-INF/resources/
        - classpath:/resources/
        - classpath:/static/
        - classpath:/public/
        - file:./uploads/  # 添加这行，映射上传目录

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.server.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload:
    path: ./uploads/avatars/